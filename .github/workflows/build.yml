name: Build
permissions:
  contents: read
  actions: read
  checks: write
on:
  push:
    paths:
      - "zenith-*/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - main
    paths:
      - "zenith-*/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"

jobs:
  build:
    name: Build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6 # https://github.com/actions/checkout/releases
      - name: Set up JDK 21
        uses: actions/setup-java@v5 # https://github.com/actions/setup-java/releases
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"
      - name: Cache Gradle
        uses: actions/cache@v5 # https://github.com/actions/cache/releases
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build and analyze
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
      - name: Collect artifacts to root
        run: |
          mkdir -p build
          cp zenith-core/build/libs/zenith-*.jar build/ || true
          cp zenith-commands/build/libs/zenith-*.jar build/ || true
          cp zenith-database/build/libs/zenith-*.jar build/ || true
          cp zenith-integrations/build/libs/zenith-*.jar build/ || true
          cp zenith-items/build/libs/zenith-*.jar build/ || true
          cp zenith-custom/build/libs/zenith-*.jar build/ || true
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact/releases
        with:
          name: Artifact
          overwrite: true
          path: build/zenith-*.jar
      - name: Keep job alive on failure for debugging
        if: failure()
        run: |
          echo "Job failed. Keeping VM alive for 30 minutes for debugging..."
          echo "SSH connection info is available in the Setup runner step above"
          sleep 300
