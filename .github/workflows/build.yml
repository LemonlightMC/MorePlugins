name: Build
on:
  push:
    branches:
      - master
      - main
jobs:
  build:
    name: Build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6 # https://github.com/actions/checkout/releases
      - name: Set up JDK 21
        uses: actions/setup-java@v5 # https://github.com/actions/setup-java/releases
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"
      - name: Cache Gradle
        uses: actions/cache@v5 # https://github.com/actions/cache/releases
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build and analyze
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
      - name: Rename JAR with Build Number
        run: |
          original_jar=$(find ./build/libs -type f -name "*.jar")
          new_name=$(echo "$original_jar" | sed "s/Zenith-\(.*\)\.jar/Zenith-\1+${{ github.run_number }}.jar/")
          mv "$original_jar" "$new_name"
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact/releases
        with:
          name: Artifact
          overwrite: true
          path: ./build/libs/Zenith-*+${{ github.run_number }}.jar
      - name: Keep job alive on failure for debugging
        if: failure()
        run: |
          echo "Job failed. Keeping VM alive for 30 minutes for debugging..."
          echo "SSH connection info is available in the Setup runner step above"
          sleep 1800
